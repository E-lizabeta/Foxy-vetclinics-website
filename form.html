<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Foxy-vetclinics/styles/mycss.css">
    <link rel="apple-touch-icon" sizes="180x180" href="Foxy-vetclinics/files/logo-icon/icon192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Foxy-vetclinics/files/logo-icon/icon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Foxy-vetclinics/files/logo-icon/icon15.png">
    <link rel="manifest" href="Foxy-vetclinics/files/logo-icon/site.webmanifest">
    <title>Foxy-vetclinics</title>
  </head>
   <style>
    html, body {
    height: 100%;
}
</style> 

<body>
  <header>
        <div class="header-inner">
            <a href="index.html" class="logo">
                <img src="Foxy-vetclinics/files/logo.png" alt="Foxy Vetclinics">
            </a>

            <nav class="nav" id="nav">
                <a href="index.html">Главная</a>
                <a href="pricing.html">Каталог</a>
                <a href="tel:+375447752874" class="header-phone">+375(44)775-28-74</a>
            </nav>
        </div>
    </header>

<section class="booking-section">
    <div class="booking-card">
        <h1>Форма для записи</h1>

        <form class="booking-form" action="#" method="post">
            <div class="form-group">
                <label for="full-name">ФИО</label>
                <input type="text" id="full-name" name="full-name" placeholder="ФИО">
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="Телефон">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="E-mail">
            </div>

            <div class="form-group">
                <label for="pet-name">Кличка питомца</label>
                <input type="text" id="pet-name" name="pet-name" placeholder="Кличка питомца">
            </div>

            <div class="form-group">
                <label for="animal-type">Вид животного</label>
                <input type="text" id="animal-type" name="animal-type" placeholder="Вид животного">
            </div>

            <div class="form-group">
                <label for="service">Услуга</label>
                <input type="text" id="service" name="service" placeholder="Услуга">
            </div>

            <div class="form-group">
                <label for="date">Дата</label>
                <input type="text" id="date" name="date" placeholder="Дата">
            </div>

            <div class="form-group">
                <label for="time">Время</label>
                <input type="text" id="time" name="time" placeholder="Время">
            </div>

            <div class="form-group">
                <label for="symptoms">Симптомы/жалобы</label>
                <textarea id="symptoms" name="symptoms" placeholder="Симптомы/жалобы"></textarea>
            </div>
            <button type="submit" class="booking-submit">Отправить</button>
        </form>
    </div>
</section>
  
   <footer>
<div class="footer-inner">
        <a href="index.html" class="footer-logo">
            <img src="Foxy-vetclinics/files/logofooter.png" alt="Foxy Vetclinics">
        </a>

        <div class="footer-center">
            <p>О бренде и его идеологии</p>
            <a href="#" class="footer-btn">Переходите сюда</a>
        </div>

        <div class="footer-socials">
            <a href="#" aria-label="Facebook" class="footer-social">
                <img src="Foxy-vetclinics/files/facebook.png" alt="Facebook">
            </a>
            <a href="#" aria-label="Instagram" class="footer-social">
                <img src="Foxy-vetclinics/files/inst.png" alt="Instagram">
            </a>
        </div>
    </div>
  </footer>
   </body>
    </html>
